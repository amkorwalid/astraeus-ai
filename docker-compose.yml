version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: astraeus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astraeus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astraeus_dev}
      POSTGRES_DB: ${POSTGRES_DB:-astraeus}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astraeus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - astraeus-network

  redis:
    image: redis:7-alpine
    container_name: astraeus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - astraeus-network

volumes:
  postgres_data:
  redis_data:

networks:
  astraeus-network:
    driver: bridge
